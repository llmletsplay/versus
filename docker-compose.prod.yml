# Production Docker Compose Configuration
# Designed for high availability and security
version: '3.8'

services:
  # PostgreSQL Database (Primary)
  postgres:
    image: postgres:16-alpine
    container_name: versus-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-versus_db}
      POSTGRES_USER: ${POSTGRES_USER:-versus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-versus_user} -d ${POSTGRES_DB:-versus_db}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - versus-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Redis for session storage and caching (Optional)
  redis:
    image: redis:7-alpine
    container_name: versus-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - versus-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # Versus Server
  server:
    build:
      context: ./versus-server
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.yourdomain.com}
    container_name: versus-server
    environment:
      NODE_ENV: production
      SERVER_PORT: 6789
      DATABASE_URL: postgresql://${POSTGRES_USER:-versus_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-versus_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://yourdomain.com}
      SENTRY_DSN: ${SENTRY_DSN}
      BACKUP_ENABLED: true
      BACKUP_SCHEDULE: daily
      BACKUP_PATH: /app/game_data/backups
    volumes:
      - game_data:/app/game_data
      - game_backups:/app/game_data/backups
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6789/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - versus-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Versus Client (Nginx)
  client:
    build:
      context: ./versus-client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.yourdomain.com}
    container_name: versus-client
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - versus-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  # Nginx Reverse Proxy (Single entry point)
  nginx:
    image: nginx:alpine
    container_name: versus-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/ssl:ro
      - ./logs/nginx:/var/log/nginx
    restart: unless-stopped
    depends_on:
      - server
      - client
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - versus-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # Backup Service (Cron-based)
  backup:
    image: postgres:16-alpine
    container_name: versus-backup
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    command: crond -f -l 8
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - versus-network

  # Monitoring (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: versus-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - versus-network

  grafana:
    image: grafana/grafana:latest
    container_name: versus-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    restart: unless-stopped
    networks:
      - versus-network

# Networks
networks:
  versus-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Volumes
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  game_data:
    driver: local
  game_backups:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# Logging configuration
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# Apply logging to all services
services:
  postgres:
    logging: *default-logging
  redis:
    logging: *default-logging
  server:
    logging: *default-logging
  client:
    logging: *default-logging
  nginx:
    logging: *default-logging
  backup:
    logging: *default-logging
  prometheus:
    logging: *default-logging
  grafana:
    logging: *default-logging