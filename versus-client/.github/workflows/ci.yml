name: Client CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'versus-client/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'versus-client/**'
      - '.github/workflows/**'

defaults:
  run:
    working-directory: versus-client

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run linting
        run: bun run lint

      - name: Run type checking
        run: bun run type-check

      - name: Check formatting
        run: bun run format:check

      - name: Build project
        run: bun run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: versus-client/dist/
