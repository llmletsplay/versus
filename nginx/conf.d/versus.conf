# Versus Application Configuration
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL configuration
    ssl_certificate /etc/ssl/certs/versus.crt;
    ssl_certificate_key /etc/ssl/private/versus.key;

    # Root directory for client
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Security
    server_tokens off;

    # Client max body size
    client_max_body_size 1M;

    # Health check endpoint
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    # API endpoints - proxy to server
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://server:6789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # CORS headers
        add_header Access-Control-Allow-Origin $CORS_ORIGIN;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
    }

    # Authentication endpoints - stricter rate limiting
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass http://server:6789;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support for real-time games
    location /ws {
        proxy_pass http://server:6789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket specific settings
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Static files with caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        try_files $uri =404;
    }

    # SPA routing - serve index.html for non-static files
    location / {
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Security - Block common attacks
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to hidden files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to .git directory
    location ~ /\.git {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# Monitoring endpoints
server {
    listen 9090;
    server_name localhost;

    # Prometheus metrics
    location /metrics {
        proxy_pass http://prometheus:9090/metrics;
        allow 127.0.0.1;
        deny all;
    }

    # Grafana
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        allow 127.0.0.1;
        deny all;
    }
}