version: '3.8'

services:
  versus-server:
    build:
      context: ./versus-server
      dockerfile: Dockerfile.dev
      target: development
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - CORS_ORIGIN=http://localhost:5173
    volumes:
      - ./versus-server:/app
      - /app/node_modules
      - game_data_dev:/app/game_data
    command: bun run dev

  versus-client:
    build:
      context: ./versus-client
      dockerfile: Dockerfile.dev
      target: development
    environment:
      - VITE_API_URL=http://localhost:6789
      - VITE_ENABLE_DEBUG=true
    volumes:
      - ./versus-client:/app
      - /app/node_modules
    command: bun run dev

volumes:
  game_data_dev:
    driver: local