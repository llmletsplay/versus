site_name: Versus Documentation
site_description: Standalone game package monorepo with reusable engines and release tooling
site_url: https://versus.dev
repo_url: https://github.com/llmletsplay/versus
repo_name: llmletsplay/versus
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture/overview.md
    - Packages: architecture/packages.md
    - Games Engine: architecture/games.md
  - Contributing:
    - Guidelines: contributing/guidelines.md
    - Maintenance Flow: contributing/maintenance.md
    - Adding Games: contributing/adding-games.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/llmletsplay/versus
