services:
  versus-server:
    build:
      context: ./versus-server
      dockerfile: Dockerfile
    container_name: versus-server
    restart: unless-stopped
    ports:
      - "6789:6789"
    environment:
      - NODE_ENV=production
      - PORT=6789
      - CORS_ORIGIN=http://localhost:5173
      - GAME_DATA_PATH=/app/game_data
      - LOG_LEVEL=info
    volumes:
      - game_data:/app/game_data
    networks:
      - versus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6789/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  versus-client:
    build:
      context: ./versus-client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:6789
    container_name: versus-client
    restart: unless-stopped
    ports:
      - "5173:3000"
    environment:
      - VITE_API_URL=http://localhost:6789
      - VITE_ENABLE_DEBUG=false
    depends_on:
      versus-server:
        condition: service_healthy
    networks:
      - versus-network

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: versus-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - versus-server
      - versus-client
    networks:
      - versus-network
    profiles:
      - production

networks:
  versus-network:
    driver: bridge
    name: versus-network

volumes:
  game_data:
    driver: local
    name: versus-game-data 