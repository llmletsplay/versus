services:
  versus-server:
    build:
      context: ./versus-server
      dockerfile: Dockerfile
      target: production
    container_name: versus-server
    restart: unless-stopped
    ports:
      - "6789:6789"
    environment:
      - NODE_ENV=production
      - PORT=6789
      - CORS_ORIGIN=http://localhost:5173
      - GAME_DATA_PATH=/app/game_data
      - LOG_LEVEL=info
      - JWT_SECRET=${JWT_SECRET:-generate-secure-secret-for-production}
      - DATABASE_URL=${DATABASE_URL:-}
    volumes:
      - game_data:/app/game_data
      - server_logs:/app/logs
    networks:
      - versus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6789/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  versus-client:
    build:
      context: ./versus-client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:6789
    container_name: versus-client
    restart: unless-stopped
    ports:
      - "5173:3000"
    environment:
      - VITE_API_URL=http://localhost:6789
      - VITE_ENABLE_DEBUG=false
    depends_on:
      versus-server:
        condition: service_healthy
    networks:
      - versus-network

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: versus-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - versus-server
      - versus-client
    networks:
      - versus-network
    profiles:
      - production

networks:
  versus-network:
    driver: bridge
    name: versus-network

volumes:
  game_data:
    driver: local
    name: versus-game-data
  server_logs:
    driver: local
    name: versus-server-logs 