version: '3.8'

services:
  versus-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '4444:4444'
    environment:
      - NODE_ENV=production
      - PORT=4444
      - CORS_ORIGIN=http://localhost:5173
      - GAME_DATA_PATH=/app/game_data
    volumes:
      - game_data:/app/game_data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4444/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Development service
  versus-server-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    ports:
      - '4444:4444'
      - '4445:4445' # MCP server port
    environment:
      - NODE_ENV=development
      - PORT=4444
      - MCP_PORT=4445
      - CORS_ORIGIN=http://localhost:5173
      - GAME_DATA_PATH=/app/game_data
    volumes:
      - .:/app
      - /app/node_modules
      - game_data_dev:/app/game_data
    command: ['bun', 'dev']
    profiles:
      - dev

volumes:
  game_data:
    driver: local
  game_data_dev:
    driver: local
