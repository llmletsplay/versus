name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: |
        cd versus-server && bun install
        cd ../versus-client && bun install

    - name: Build server
      run: cd versus-server && bun run build

    - name: Build client  
      run: cd versus-client && bun run build

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/${{ github.repository }}-server
          ghcr.io/${{ github.repository }}-client

    - name: Build and push server
      uses: docker/build-push-action@v5
      with:
        context: ./versus-server
        push: true
        tags: |
          ghcr.io/${{ github.repository }}-server:latest
          ghcr.io/${{ github.repository }}-server:${{ github.ref_name }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push client
      uses: docker/build-push-action@v5
      with:
        context: ./versus-client
        push: true
        tags: |
          ghcr.io/${{ github.repository }}-client:latest
          ghcr.io/${{ github.repository }}-client:${{ github.ref_name }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          versus-server/dist/*
          versus-client/dist/*
        generate_release_notes: true
        draft: false
        prerelease: false