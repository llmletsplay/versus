name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: versus-server

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Run linting
      run: bun run lint

    - name: Run type checking
      run: bun run type-check

    - name: Run tests
      run: bun test

    - name: Build server
      run: bun run build

  client-tests:
    name: Client Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: versus-client

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Run linting
      run: bun run lint

    - name: Run type checking
      run: bun run type-check

    - name: Build client
      run: bun run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [server-tests, client-tests]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build server image
      uses: docker/build-push-action@v5
      with:
        context: ./versus-server
        push: false
        tags: versus-server:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build client image
      uses: docker/build-push-action@v5
      with:
        context: ./versus-client
        push: false
        tags: versus-client:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker Compose
      run: |
        docker-compose build
        docker-compose up -d
        sleep 10
        docker-compose ps
        curl -f http://localhost:6789/api/v1/health || exit 1
        docker-compose down