name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Package And Platform Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build:packages

      - name: Check package release contract
        run: npm run check:packages

      - name: Run game tests
        run: npm run test:games

      - name: Lint server
        run: npm --prefix versus-server run lint

      - name: Type-check server
        run: npm --prefix versus-server run type-check

      - name: Build server
        run: npm --prefix versus-server run build

      - name: Build client
        run: npm --prefix versus-client run build