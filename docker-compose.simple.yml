# Minimal Docker setup - Just PostgreSQL
# Run server and client locally with bun for fastest development

services:
  postgres:
    image: postgres:16-alpine
    container_name: versus-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-versus_db}
      POSTGRES_USER: ${POSTGRES_USER:-versus_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U versus_user -d versus_db"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
